# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-dimensional candidate ranking engine with 6 weighted scoring
  dimensions derived directly from the job description:
  - Retrieval & Ranking Skills (30%): Pinecone, FAISS, Weaviate,
    Elasticsearch, Embeddings, Sentence Transformers
  - Career Context & Company Fit (26%): product companies vs consulting,
    title trajectory, leadership evidence
  - Applied ML Depth pre-LLM era (18%): XGBoost, LTR, BM25, PyTorch,
    fine-tuning — rewards genuine depth over keyword presence
  - Experience Band (12%): 5-9 yr ideal, disqualifier pattern detection
  - Location & Logistics (9%): Pune/Noida, notice period, work mode
  - Education Signal (5%): tier × field relevance

  Final score = Composite × Behavioral Multiplier (0.10-1.0).
  Behavioral multiplier built from 23 Redrob signals covering
  availability (40%), engagement quality (38%), and profile
  credibility (22%).

  Trap detection: consulting-only careers capped at 12/100,
  ghost candidates down-weighted via exponential recency decay,
  keyword stuffers caught by career history text mining,
  honeypots detected via timeline and skill-duration consistency checks.

  Runtime: ~18 seconds for 100K candidates on CPU.

